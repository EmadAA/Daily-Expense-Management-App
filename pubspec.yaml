name: daily_expense_manager_app
description: Daily income and expense tracker
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  app_links: ^6.0.0
  fl_chart: ^0.68.0
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.3
  http: ^1.2.1
  image_picker: ^1.1.2
  image: ^4.1.7
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1D9E75"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
